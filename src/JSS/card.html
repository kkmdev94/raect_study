<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/card.css" />
    <title>Instaragram</title>
  </head>
  <body>
    <section class="container">
      <article class="card">
        <header>
          <div class="circle-image">
            <img src="images/profile.png" />
          </div>
          <div class="card-username">
            <span>inflearn</span>
          </div>
          <div class="option-more">
            <button class="transparent-button">
              <img src="images/icons/mark.png" />
            </button>
          </div>
        </header>
        <!--HEADER END-->

        <main>
          <div class="carousel" data="0">
            <!-- carousel area-->
          </div>
          <div class="card-container">
            <div class="card-buttons">
              <div>
                <button class="transparent-button">
                  <img src="images/icons/heart.png" />
                </button>
              </div>
              <div>
                <button class="transparent-button">
                  <img src="images/icons/chat.png" />
                </button>
              </div>
              <div>
                <button class="transparent-button">
                  <img src="images/icons/paper-plane.png" />
                </button>
              </div>
              <div class="last-card-button">
                <button class="transparent-button">
                  <img src="images/icons/bookmark.png" />
                </button>
              </div>
            </div>
            <div class="card-likes"></div>
            <div class="card-content"></div>
            <div class="card-time"></div>
          </div>
        </main>
        <footer></footer>
      </article>
    </section>
  </body>
</html>
